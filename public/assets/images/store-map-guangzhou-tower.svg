<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">广东省广州市广州塔1号周边手绘地图</title>
  <desc id="desc">以广州塔为中心，绘制珠江、阅江西路、艺洲路、广州塔地铁站、赤岗塔站和海心桥等周边位置。</desc>
  <defs>
